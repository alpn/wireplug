name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/wireplugd dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireplugd-${{ matrix.os }}
          path: dist/
